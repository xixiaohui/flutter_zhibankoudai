name: flutter_application_zhiban
description: ZhiBanKouDai - Personal Expert Knowledge Base
publish_to: 'none'
version: 2026.05.03+1777771265

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  go_router: ^14.2.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  logger: ^2.3.0
  share_plus: ^9.0.0
  screenshot: ^3.0.0
  http: ^1.2.0
  path_provider: ^2.1.5
  auto_size_text: ^3.0.0
  permission_handler: ^12.0.1
  flutter_markdown: ^0.7.0
  gal: ^2.3.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/cloudData/prompts/aiPrompts.json
    - .env
  fonts:
    - family: NotoSansSC-Bold
      fonts:
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700

    - family: NotoSerifSC-Regular
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.ttf
          weight: 400

